<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Inversion Principle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #f0f9ff 0%, #fdf4ff 100%);
    overflow: hidden;
    width: 100%;
    height: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 16px;
  }
  .title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #475569;
  }
  .columns {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: 100%;
    max-width: 680px;
    flex: 1;
    max-height: 245px;
  }
  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding: 10px;
    border-radius: 12px;
  }
  .col-forward { background: rgba(59,130,246,0.08); }
  .col-invert  { background: rgba(245,158,11,0.10); }
  .col-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .col-forward .col-header { color: #3b82f6; }
  .col-invert  .col-header { color: #d97706; }
  .q {
    background: #fff;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 11px;
    color: #1e293b;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    line-height: 1.4;
    font-weight: 500;
  }
  .divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 36px;
    flex-shrink: 0;
    gap: 6px;
  }
  .divider-line {
    width: 2px;
    flex: 1;
    background: linear-gradient(to bottom, #3b82f6, #f59e0b);
    border-radius: 2px;
  }
  .divider-arrow {
    font-size: 18px;
    color: #6366f1;
    line-height: 1;
  }
  .subtitle {
    font-size: 9.5px;
    color: #64748b;
    text-align: center;
    font-style: italic;
    max-width: 560px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="title">The Inversion Principle</div>
  <div class="columns">
    <div class="col col-forward">
      <div class="col-header">Think Forward →</div>
      <div class="q">How do I succeed?</div>
      <div class="q">How do I make good decisions?</div>
      <div class="q">How do I build wealth?</div>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-arrow">↩</div>
      <div class="divider-line"></div>
    </div>
    <div class="col col-invert">
      <div class="col-header">Invert ↩</div>
      <div class="q">What guarantees failure?</div>
      <div class="q">What leads to terrible decisions?</div>
      <div class="q">What destroys wealth?</div>
    </div>
  </div>
  <div class="subtitle">"Avoid the negative and the positive takes care of itself." — Charlie Munger</div>
</body>
</html>
