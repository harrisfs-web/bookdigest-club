<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 13 Forces That Shape History</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f8fafc;
    overflow: hidden;
    width: 100%;
    height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    gap: 10px;
  }
  .title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
  }
  .groups {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 700px;
  }
  .group {
    flex: 1;
    border-radius: 12px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.07);
  }
  .group-natural { background: linear-gradient(160deg, #dbeafe 0%, #bfdbfe 100%); border: 1.5px solid #93c5fd; }
  .group-cultural { background: linear-gradient(160deg, #fef9c3 0%, #fde68a 100%); border: 1.5px solid #fcd34d; }
  .group-political { background: linear-gradient(160deg, #fee2e2 0%, #fecaca 100%); border: 1.5px solid #fca5a5; }
  .group-growth { background: linear-gradient(160deg, #d1fae5 0%, #a7f3d0 100%); border: 1.5px solid #6ee7b7; }
  .group-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2px;
  }
  .group-natural .group-label { color: #1d4ed8; }
  .group-cultural .group-label { color: #92400e; }
  .group-political .group-label { color: #b91c1c; }
  .group-growth .group-label { color: #065f46; }
  .pill {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.65);
    border-radius: 20px;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 600;
    color: #1e293b;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .pill-icon { font-size: 12px; }
</style>
</head>
<body>
  <div class="title">The 13 Forces That Shape History</div>
  <div class="groups">
    <div class="group group-natural">
      <div class="group-label">Natural Forces</div>
      <div class="pill"><span class="pill-icon">🌍</span>Geography</div>
      <div class="pill"><span class="pill-icon">🧬</span>Biology</div>
    </div>
    <div class="group group-cultural">
      <div class="group-label">Cultural Forces</div>
      <div class="pill"><span class="pill-icon">⚖️</span>Morality</div>
      <div class="pill"><span class="pill-icon">🏛️</span>Religion</div>
      <div class="pill"><span class="pill-icon">🎨</span>Arts</div>
      <div class="pill"><span class="pill-icon">🗣️</span>Language</div>
    </div>
    <div class="group group-political">
      <div class="group-label">Political Forces</div>
      <div class="pill"><span class="pill-icon">🏙️</span>Government</div>
      <div class="pill"><span class="pill-icon">⚔️</span>War</div>
      <div class="pill"><span class="pill-icon">👑</span>Aristocracy</div>
    </div>
    <div class="group group-growth">
      <div class="group-label">Growth Forces</div>
      <div class="pill"><span class="pill-icon">💰</span>Economics</div>
      <div class="pill"><span class="pill-icon">🔬</span>Science</div>
      <div class="pill"><span class="pill-icon">📚</span>Education</div>
      <div class="pill"><span class="pill-icon">👨‍👩‍👧</span>Demographics</div>
    </div>
  </div>
</body>
</html>
